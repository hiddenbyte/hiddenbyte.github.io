name: Post to Instagram

on:
  workflow_dispatch:
    inputs:
      post_path:
        description: 'Blog post URL path (e.g. posts/my-blog-post)'
        required: true
        type: string

# Required secrets:
#   INSTAGRAM_USER_ID      — numeric Instagram user ID (find at graph.instagram.com/me?fields=id&access_token=TOKEN)
#   INSTAGRAM_ACCESS_TOKEN — long-lived token (valid 60 days; refresh with the instagram-token-refresh workflow)
#   CLOUDINARY_URL         — cloudinary://API_KEY:API_SECRET@CLOUD_NAME  (free tier is enough)

jobs:
  post-to-instagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-instagram-graph

      - name: Install Python dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Post to Instagram
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
        run: python .github/scripts/instagram_post.py "${{ inputs.post_path }}"
