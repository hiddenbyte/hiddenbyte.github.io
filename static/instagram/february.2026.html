<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Dump // Recent Memories</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --text-color: #1a1a1a;
            --gap: 15px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        /* The Magic: CSS Grid Masonry-style */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 200px; /* Base row height */
            gap: var(--gap);
            max-width: 1200px;
            margin: 0 auto;
        }

        .photo-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background-color: #eee;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .photo-item:hover img {
            transform: scale(1.05);
        }

        /* Variation in sizes for that "dump" look */
        .photo-item.tall { grid-row: span 3; }
        .photo-item.wide { grid-column: span 2; }
        .photo-item.big { grid-column: span 2; grid-row: span 2; }

        @media (max-width: 768px) {
            .photo-item.wide, .photo-item.big {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Late Summer '25 — Photo Dump</h1>
    </header>

    <main class="photo-grid">
        <div class="photo-item tall">
            <img src="https://picsum.photos/600/1200?random=1" alt="Vertical memory">
        </div>

        <div class="photo-item">
            <img src="https://picsum.photos/600/600?random=2" alt="Square memory">
        </div>

        <div class="photo-item big">
            <img src="https://picsum.photos/1200/1200?random=3" alt="Main highlight">
        </div>

        <div class="photo-item">
            <img src="https://picsum.photos/600/600?random=4" alt="Candid moment">
        </div>

        <div class="photo-item wide">
            <img src="https://picsum.photos/1200/600?random=5" alt="Landscape view">
        </div>

        <div class="photo-item tall">
            <img src="https://picsum.photos/600/1200?random=6" alt="Outfit check">
        </div>

        <div class="photo-item">
            <img src="https://picsum.photos/600/600?random=7" alt="Coffee shot">
        </div>
    </main>

</body>
</html>
